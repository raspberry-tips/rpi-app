Categories:
  - Internet
License: MIT
AuthorName: raspberry.tips
AuthorWebSite: https://raspberry.tips
SourceCode: https://github.com/raspberry-tips/rpi-app
IssueTracker: https://github.com/raspberry-tips/rpi-app/issues

RepoType: git
Repo: https://github.com/raspberry-tips/rpi-app

Builds:
  - versionName: 1.0.0
    versionCode: 2
    commit: v1.0.0
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - git -C $$flutter$$ checkout -f 3.29.2
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build: $$flutter$$/bin/flutter build apk --release
    ndk: r27b

AutoUpdateMode: None
UpdateCheckMode: None
CurrentVersion: 1.0.0
CurrentVersionCode: 2
